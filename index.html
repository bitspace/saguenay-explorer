<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saguenay Explorer</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="hud-row"><span>Speed</span><span id="hud-speed">0.0</span></div>
      <div class="hud-row"><span>Altitude</span><span id="hud-alt">0.0</span></div>
      <div class="hud-row"><span>Heading</span><span id="hud-heading">0</span></div>
      <div class="hud-row"><span>Direction</span><span id="hud-cardinal">N</span></div>
      <div class="hud-row"><span>Surface</span><span id="hud-surface">DEM (local)</span></div>
      <div class="hud-row"><span>POIs</span><span id="hud-pois">0/0</span></div>
      <div class="hud-row controls">
        <span>Controls</span>
        <span>W/S Fwd-Back, A/D Turn, Q/E Strafe, PgUp/PgDn Elev.</span>
      </div>
    </div>
    <div id="attribution" hidden>Imagery © Google</div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
